<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Anymech Products V2</title>
  <style>
    :root{
      --blue:#1a56db;--green:#16a34a;--pink:#c026d3;
      --orange:#d97706;--dark:#111827;--red:#dc2626;
      --bg:#f1f4f9;--card:#fff;--border:#e2e8f0;
      --text:#0f172a;--muted:#64748b;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,Arial,sans-serif;background:var(--bg);min-height:100vh;padding:10px 10px 40px;color:var(--text)}
    .frame{max-width:600px;margin:0 auto}

    /* HEADER */
    .appTitle{text-align:center;font-size:26px;font-weight:900;color:var(--blue);letter-spacing:2px;padding:14px 0 4px;text-transform:uppercase}
    .appSub{text-align:center;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}

    /* CARD */
    .card{background:var(--card);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid var(--border)}
    .card-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

    /* STAGE BUTTONS */
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .sbtn{padding:20px 6px;border-radius:13px;font-size:16px;font-weight:900;letter-spacing:0.3px;text-transform:uppercase;border:2.5px solid transparent;background:#fff;cursor:pointer;transition:transform 0.1s,background 0.12s,color 0.12s;user-select:none;line-height:1.2}
    .sbtn:active{transform:scale(0.93)}
    .s-in{color:var(--blue);border-color:var(--blue)}
    .s-ready{color:var(--pink);border-color:var(--pink)}
    .s-out{color:var(--green);border-color:var(--green)}
    .s-extra{color:var(--dark);border-color:var(--dark)}
    .s-boxes{color:var(--orange);border-color:var(--orange)}
    .sbtn.sel{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,0.18)}
    .s-in.sel{background:var(--blue)}
    .s-ready.sel{background:var(--pink)}
    .s-out.sel{background:var(--green)}
    .s-extra.sel{background:var(--dark)}
    .s-boxes.sel{background:var(--orange)}

    /* CAMERA FULLSCREEN */
    .camWrap{display:none;position:fixed;inset:0;background:#000;z-index:9990;align-items:center;justify-content:center;padding-bottom:120px}
    .roiViewport{width:min(99vw,600px);aspect-ratio:1.65/1;border-radius:14px;overflow:hidden;position:relative;background:#111;z-index:9991}
    .roiViewport video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;aspect-ratio:auto;border-radius:0}
    .roiBorder{position:absolute;inset:0;border:3px solid rgba(255,255,255,0.85);border-radius:14px;pointer-events:none;z-index:2}
    .guideLine{position:absolute;left:0;right:0;height:2px;background:rgba(255,80,80,0.9);top:50%;pointer-events:none;z-index:3}
    .guideLabel{position:absolute;left:10px;top:calc(50% - 26px);background:rgba(0,0,0,0.65);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;pointer-events:none;z-index:3}
    .stagePill{position:absolute;top:10px;right:10px;font-size:11px;font-weight:900;letter-spacing:1px;padding:5px 12px;border-radius:20px;pointer-events:none;z-index:3;text-transform:uppercase;color:#fff}

    /* FIXED CAPTURE BUTTON */
    .btnFixed{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:min(92vw,420px);z-index:9992}
    .btnFixedInner{width:100%;padding:22px;border-radius:16px;font-size:20px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase;border:none;cursor:pointer;background:linear-gradient(160deg,#2563eb,#1a40c4);color:#fff;box-shadow:0 8px 0 rgba(0,0,0,0.28),0 16px 32px rgba(0,0,0,0.22);transition:transform 0.08s,box-shadow 0.08s;user-select:none}
    .btnFixedInner:active{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,0.28),0 6px 12px rgba(0,0,0,0.14)}

    /* STATUS */
    .status{font-size:13px;line-height:1.6;white-space:pre-wrap;background:#f8fafc;border-radius:12px;padding:12px 14px;color:#334155;border-left:3px solid var(--border);min-height:44px;font-family:monospace}
    .status.ok{background:#f0fdf4;border-left-color:var(--green);color:#14532d}
    .status.err{background:#fff1f2;border-left-color:var(--red);color:#7f1d1d}
    .status.info{background:#eff6ff;border-left-color:var(--blue);color:#1e3a5f}

    /* CAPTURED PREVIEW */
    .prevWrap{display:none;position:relative;border-radius:12px;overflow:hidden;margin-bottom:10px;background:#000;max-height:220px}
    .prevWrap img{width:100%;max-height:220px;object-fit:contain;display:block}
    .prevTag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
    .clarityTag{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.65);color:#fbbf24;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}

    /* DATA TABLE */
    .kv{display:grid;grid-template-columns:150px 1fr;gap:0}
    .kv-lbl{font-size:13px;font-weight:700;color:var(--muted);padding:11px 0;border-bottom:1px solid #f1f5f9}
    .kv-val{font-size:14px;font-weight:800;color:var(--text);padding:11px 0;border-bottom:1px solid #f1f5f9;word-break:break-all}
    .kv-val.capW{font-size:32px;font-weight:900;color:var(--blue);letter-spacing:2px;line-height:1.1;padding-left:12px}
    .kv-lbl.capW-lbl{color:var(--blue);font-weight:900}
    .kv-val.stage-ok{color:var(--green);font-weight:900}
    .hl-red{background:#fee2e2;border-radius:6px;padding:2px 8px;color:#991b1b;display:inline-block}
    .hl-grn{background:#dcfce7;border-radius:6px;padding:2px 8px;color:#14532d;display:inline-block}

    /* WEIGHT OVERRIDE */
    .overrideWrap{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
    .overrideLbl{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block}
    .overrideInput{width:100%;padding:12px;font-size:22px;font-weight:700;font-family:monospace;border:2px solid var(--border);border-radius:12px;text-align:center;color:var(--blue);outline:none;background:#f8fafc}
    .overrideInput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,0.12)}

    /* BOXES COUNT INPUT */
    .boxesWrap{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
    .boxesLbl{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--orange);margin-bottom:8px;display:block}
    .boxesInput{width:100%;padding:16px;font-size:40px;font-weight:900;font-family:monospace;border:2.5px solid var(--orange);border-radius:14px;text-align:center;color:var(--orange);outline:none;background:#fffbeb}
    .boxesInput:focus{box-shadow:0 0 0 3px rgba(217,119,6,0.2)}

    /* EXTRA INFO */
    .extraInfo{display:none;margin-top:10px;background:#fefce8;border:1px solid #fde68a;border-radius:12px;padding:12px 14px;font-size:12.5px;color:#78350f;line-height:1.6}



    /* ACTION BUTTONS */
    .btn{width:100%;padding:22px;border-radius:16px;font-size:20px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase;border:none;cursor:pointer;user-select:none;box-shadow:0 8px 0 rgba(0,0,0,0.18),0 14px 28px rgba(0,0,0,0.10);transition:transform 0.08s,box-shadow 0.08s;margin-bottom:10px;display:none}
    .btn:active{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,0.18),0 6px 12px rgba(0,0,0,0.10)}
    .btn-reset-a{background:linear-gradient(160deg,#dc2626,#a81c1c);color:#fff}
    .btn-submit{background:linear-gradient(160deg,#16a34a,#0f7a36);color:#fff}

    /* SUCCESS OVERLAY */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.22);z-index:9999;align-items:center;justify-content:center}
    .overlayCard{background:#fff;border-radius:22px;padding:28px 24px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.22);width:min(300px,86vw)}
    .overlayTick{font-size:56px;line-height:1;margin-bottom:10px}
    .overlayTitle{font-size:18px;font-weight:900;letter-spacing:0.5px;color:var(--green)}
    .overlaySub{font-size:13px;color:var(--muted);margin-top:5px}

    canvas{display:none}

    @media(max-width:420px){
      body{padding:8px 8px 32px}
      .appTitle{font-size:22px}
      .sbtn{padding:18px 4px;font-size:15px;border-radius:11px}
      .kv{grid-template-columns:120px 1fr}
      .kv-val.capW{font-size:26px}
      .btn{font-size:18px;padding:20px}
      .btnFixedInner{font-size:18px;padding:20px}
    }
  </style>
</head>
<body>
<div class="frame">

  <div class="appTitle">Anymech Products</div>


  <!-- STAGE BUTTONS -->
  <div class="card">

    <div class="row2" style="margin-bottom:8px">
      <button class="sbtn s-in"    id="sIn">IN</button>
      <button class="sbtn s-out"   id="sOut">OUT</button>
    </div>
    <div class="row2">
      <button class="sbtn s-ready" id="sReady">READY</button>
      <button class="sbtn s-boxes" id="sBoxes">BOXES COUNT</button>
    </div>
  </div>

  <!-- CAMERA / STATUS -->
  <div class="card">
    <div class="prevWrap" id="prevWrap">
      <img id="prevImg" src="" alt="Captured frame"/>
      <div class="prevTag" id="prevTag">📸 Captured</div>
      <div class="clarityTag" id="clarityTag"></div>
    </div>
    <div class="status info" id="status">Select a stage above to open camera.</div>
  </div>



  <!-- DATA CARD -->
  <div class="card">
    <div class="card-title">Capture Data</div>
    <div class="kv">
      <div class="kv-lbl">NEW M.NO</div>
      <div class="kv-val" id="dMid">-</div>
      <div class="kv-lbl">MEMBER NAME</div>
      <div class="kv-val" id="dMname">-</div>
      <div class="kv-lbl">ITEM NAME</div>
      <div class="kv-val" id="dItem">-</div>
      <div class="kv-lbl capW-lbl" id="capWLbl">CAPTURED WEIGHT</div>
      <div class="kv-val capW" id="dCapW">-</div>
      <div class="kv-lbl">OUT WEIGHT</div>
      <div class="kv-val" id="dOutW">-</div>
      <div class="kv-lbl">IN WEIGHT</div>
      <div class="kv-val" id="dInW">-</div>
      <div class="kv-lbl">READY / BOXES</div>
      <div class="kv-val" id="dReadyW">-</div>
      <div class="kv-lbl">SHORT MATERIAL</div>
      <div class="kv-val" id="dShort">-</div>
      <div class="kv-lbl">STATUS</div>
      <div class="kv-val stage-ok" id="dStage">-</div>
    </div>

    <!-- Weight override (hidden for BOXES COUNT) -->
    <div class="overrideWrap" id="overrideWrap">
      <label class="overrideLbl">✏️ Weight wrong? Correct it here:</label>
      <input type="number" step="0.001" min="0" class="overrideInput" id="wtInput"
             placeholder="e.g. 58.500"
             oninput="this.dataset.edited=(parseFloat(this.value)!==parseFloat(this.dataset.original))?'true':'false';
                      this.style.borderColor=this.dataset.edited==='true'?'#d97706':'';
                      this.style.background=this.dataset.edited==='true'?'#fff7ed':''"/>
    </div>

    <!-- Boxes count (only for BOXES COUNT stage) -->
    <div class="boxesWrap" id="boxesWrap">
      <label class="boxesLbl">📦 Enter Boxes Count:</label>
      <input type="number" min="1" step="1" class="boxesInput" id="boxesInput" placeholder="0"/>
    </div>

    <!-- Extra weight note -->
    <div class="extraInfo" id="extraInfo"></div>

    <!-- EXTRA WEIGHT — small button at bottom of data card -->
    <button class="sbtn s-extra" id="sExtra"
            style="width:100%;margin-top:14px;padding:11px;font-size:12px;border-radius:11px">
      ➕ EXTRA WEIGHT
    </button>
  </div>

  <!-- ACTION BUTTONS: RESET above SUBMIT -->
  <button class="btn btn-reset-a" id="btnResetA">↺ RESET</button>
  <button class="btn btn-submit"  id="btnSubmit">✅ SUBMIT</button>

</div>

<!-- FULLSCREEN CAMERA -->
<div class="camWrap" id="camWrap">
  <div class="roiViewport" id="roiViewport">
    <video id="video" autoplay playsinline muted></video>
    <div class="roiBorder"></div>
    <div class="guideLine"></div>
    <div class="guideLabel">Top: Member Card · Bottom: Scale</div>
    <div class="stagePill" id="stagePill"></div>
  </div>
</div>

<div class="btnFixed" id="btnFixedWrap">
  <button class="btnFixedInner" id="btnCaptureFixed">CAPTURE FRAME</button>
</div>

<!-- SUCCESS OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlayCard">
    <div class="overlayTick">✅</div>
    <div class="overlayTitle" id="overlayTitle">LOGGED</div>
    <div class="overlaySub"   id="overlaySub"></div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
window.onerror=function(msg,s,l,c){
  try{setStatus("JS ERROR: "+msg+" (line "+l+")","err");}catch(e){}
  return false;
};

const BACKEND_URL="https://script.google.com/macros/s/AKfycbxKA9Zi7ACn_3e3a-1nb53nQ0iVzh4Mrhne3_38-qfMbnfNFNmnNTd6yFew8V8lRYBrtQ/exec";

/* ── STATE ── */
let uiState="idle"; // idle | cam | processing | await | submitting
let stage=null;
let stream=null;
let pending=null;
let capSess=0;

/* ── ELEMENTS ── */
const video       =document.getElementById("video");
const canvas      =document.getElementById("canvas");
const camWrap     =document.getElementById("camWrap");
const btnFixedWrap=document.getElementById("btnFixedWrap");
const btnCapFixed =document.getElementById("btnCaptureFixed");
const btnSubmit   =document.getElementById("btnSubmit");
const btnResetA   =document.getElementById("btnResetA");

/* ── STAGE CONFIG ── */
const STAGE_CFG={
  IN:          {id:"sIn",    color:"#1a56db", label:"IN"},
  READY:       {id:"sReady", color:"#c026d3", label:"READY"},
  OUT:         {id:"sOut",   color:"#16a34a", label:"OUT"},
  EXTRA_WEIGHT:{id:"sExtra", color:"#111827", label:"EXTRA WEIGHT"},
  BOXES:       {id:"sBoxes", color:"#d97706", label:"BOXES COUNT"},
};

/* ── HELPERS ── */
function _ms_(t0){return Math.round(performance.now()-t0);}
function tx(id,v){const e=document.getElementById(id);if(e)e.textContent=(v===null||v===undefined)?"-":String(v);}
function setStatus(msg,cls){const el=document.getElementById("status");el.textContent=msg||"";el.className="status "+(cls||"info");}

function setShortage(v){
  const el=document.getElementById("dShort");el.className="kv-val";
  if(v===null||v===undefined||v===""){el.textContent="-";return;}
  const n=Number(v);if(isNaN(n)){el.textContent="-";return;}
  el.textContent=n.toFixed(3);
  if(n<-0.200) el.innerHTML='<span class="hl-red">▼ '+n.toFixed(3)+'</span>';
  else if(n>0.200) el.innerHTML='<span class="hl-grn">▲ '+n.toFixed(3)+'</span>';
}

function tickSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type="square";o.frequency.value=1200;g.gain.value=0.06;
    o.connect(g);g.connect(ac.destination);
    o.start();setTimeout(()=>{o.stop();ac.close();},90);
  }catch(e){}
}

function showOverlay(title,sub){
  document.getElementById("overlayTitle").textContent=title||"LOGGED";
  document.getElementById("overlaySub").textContent=sub||"";
  const el=document.getElementById("overlay");
  el.style.display="flex";
  setTimeout(()=>el.style.display="none",1800);
}

/* ── SHOW UI ── */
function showUI(){
  const isCam  =uiState==="cam";
  const isAwait=uiState==="await";
  const isSub  =uiState==="submitting";
  const isBoxes=(stage==="BOXES");

  camWrap.style.display      =isCam?"flex":"none";
  btnFixedWrap.style.display =isCam?"block":"none";
  btnResetA.style.display    =isAwait?"block":"none";
  btnSubmit.style.display    =(isAwait||isSub)?"block":"none";

  if(isSub){btnSubmit.textContent="⏳ SUBMITTING...";btnSubmit.disabled=true;}
  else{btnSubmit.textContent="✅ SUBMIT";btnSubmit.disabled=false;}

  // BOXES COUNT: hide captured weight row, show count input
  const capWRow=document.getElementById("capWLbl");
  const capWVal=document.getElementById("dCapW");
  if(isAwait&&isBoxes){
    if(capWRow) capWRow.style.display="none";
    if(capWVal) capWVal.style.display="none";
    document.getElementById("overrideWrap").style.display="none";
    document.getElementById("boxesWrap").style.display="block";
  } else {
    if(capWRow) capWRow.style.display="";
    if(capWVal) capWVal.style.display="";
    document.getElementById("overrideWrap").style.display=isAwait?"block":"none";
    document.getElementById("boxesWrap").style.display="none";
  }
  document.getElementById("extraInfo").style.display=(isAwait&&stage==="EXTRA_WEIGHT")?"block":"none";
}

/* ── SELECT STAGE → open camera immediately ── */
async function selectStage(s){
  if(["processing","submitting"].includes(uiState)) return;
  stopCamera();
  stage=s;
  pending=null;
  capSess++;

  // Highlight selected button
  Object.entries(STAGE_CFG).forEach(([k,v])=>{
    document.getElementById(v.id).classList.toggle("sel",k===s);
  });

  // Camera pill
  const cfg=STAGE_CFG[s];
  const pill=document.getElementById("stagePill");
  pill.textContent=cfg.label;pill.style.background=cfg.color;

  // Clear inputs
  document.getElementById("wtInput").value="";
  document.getElementById("wtInput").dataset.original="";
  document.getElementById("wtInput").dataset.edited="false";
  document.getElementById("wtInput").style.borderColor="";
  document.getElementById("wtInput").style.background="";
  document.getElementById("boxesInput").value="";
  document.getElementById("extraInfo").style.display="none";
  document.getElementById("prevWrap").style.display="none";
  document.getElementById("prevImg").src="";
  document.getElementById("clarityTag").textContent="";
  tx("dCapW","-");

  // Open camera immediately
  uiState="cam";
  showUI();
  setStatus("Opening camera for "+cfg.label+"...","info");
  try{
    await startCamera();
    setStatus("Camera ON ✅  ["+cfg.label+"]\nAlign: Member Card (top) + Scale (bottom)\nPress CAPTURE FRAME.","ok");
  }catch(err){
    setStatus("Camera error: "+(err&&err.message?err.message:String(err)),"err");
    uiState="idle";showUI();
  }
}

/* ── RESET ── */
function doReset(){
  stopCamera();
  stage=null;pending=null;capSess++;uiState="idle";

  Object.values(STAGE_CFG).forEach(v=>document.getElementById(v.id).classList.remove("sel"));
  ["dMid","dMname","dItem","dCapW","dOutW","dInW","dReadyW","dStage"].forEach(id=>tx(id,"-"));
  setShortage(null);
  document.getElementById("prevWrap").style.display="none";
  document.getElementById("prevImg").src="";
  document.getElementById("clarityTag").textContent="";
  document.getElementById("wtInput").value="";
  document.getElementById("wtInput").style.borderColor="";
  document.getElementById("wtInput").style.background="";
  document.getElementById("boxesInput").value="";
  document.getElementById("extraInfo").style.display="none";
  showUI();
  setStatus("Reset ✓  Select a stage to begin.","info");
}

/* ── CAMERA ── */
async function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)
    throw new Error("Camera API not available.");
  if(!window.isSecureContext)
    throw new Error("Camera requires HTTPS.");

  try{video.muted=true;}catch(e){}

  try{
    if(navigator.permissions&&navigator.permissions.query){
      const st=await navigator.permissions.query({name:"camera"});
      if(st&&st.state==="denied")
        throw new Error("Camera permission DENIED. Allow camera in browser settings then reload.");
    }
  }catch(e){if(e.message&&e.message.includes("DENIED")) throw e;}

  const attempts=[
    {video:{facingMode:{ideal:"environment"},width:{min:1280,ideal:1920,max:1920},height:{min:720,ideal:1080,max:1080},aspectRatio:{ideal:16/9}},audio:false},
    {video:{facingMode:{ideal:"environment"},aspectRatio:{ideal:16/9}},audio:false},
    {video:{facingMode:{ideal:"environment"}},audio:false},
    {video:{facingMode:"environment"},audio:false},
    {video:true,audio:false}
  ];
  let lastErr=null;
  for(const c of attempts){
    try{stream=await navigator.mediaDevices.getUserMedia(c);lastErr=null;break;}
    catch(e){lastErr=e;}
  }
  if(lastErr) throw new Error("Camera not available: "+(lastErr.message||String(lastErr)));

  video.srcObject=stream;
  try{
    const track=stream.getVideoTracks()[0];
    const caps=track&&track.getCapabilities?track.getCapabilities():null;
    const adv=[];
    if(caps&&caps.focusMode&&Array.isArray(caps.focusMode)){
      if(caps.focusMode.includes("continuous")) adv.push({focusMode:"continuous"});
      else if(caps.focusMode.includes("auto")) adv.push({focusMode:"auto"});
    }
    if(caps&&caps.zoom&&typeof caps.zoom.min==="number")
      adv.push({zoom:Math.min(caps.zoom.max,Math.max(caps.zoom.min,1.3))});
    if(caps&&caps.exposureMode&&Array.isArray(caps.exposureMode)&&caps.exposureMode.includes("continuous"))
      adv.push({exposureMode:"continuous"});
    if(adv.length) await track.applyConstraints({advanced:adv});
  }catch(e){}

  await new Promise(r=>{
    if(video.videoWidth&&video.videoHeight) return r();
    video.onloadedmetadata=()=>r();
  });
  await video.play();
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>requestAnimationFrame(r));
}

function stopCamera(){
  try{if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}catch(e){}
  video.srcObject=null;
  camWrap.style.display="none";
  btnFixedWrap.style.display="none";
}

/* ── CAPTURE ROI ── */
function captureROI(){
  const vw=video.videoWidth,vh=video.videoHeight;
  if(!vw||!vh) throw new Error("Video not ready.");
  const roi=document.getElementById("roiViewport");
  let sx=0,sy=0,sw=vw,sh=vh;
  try{
    if(roi){
      const vRect=video.getBoundingClientRect();
      const rRect=roi.getBoundingClientRect();
      if(vRect.width>0&&rRect.width>0){
        const scale=Math.max(vRect.width/vw,vRect.height/vh);
        const offX=((vw*scale)-vRect.width)/2,offY=((vh*scale)-vRect.height)/2;
        let _sx=(rRect.left-vRect.left+offX)/scale;
        let _sy=(rRect.top-vRect.top+offY)/scale;
        let _sw=rRect.width/scale,_sh=rRect.height/scale;
        if(_sx<0){_sw+=_sx;_sx=0;} if(_sy<0){_sh+=_sy;_sy=0;}
        if(_sx+_sw>vw) _sw=vw-_sx; if(_sy+_sh>vh) _sh=vh-_sy;
        if(_sw>10&&_sh>10){sx=_sx;sy=_sy;sw=_sw;sh=_sh;}
      }
    }
  }catch(e){}
  const maxW=1600;
  let outW=Math.round(sw),outH=Math.round(sh);
  if(outW>maxW){const sc=maxW/outW;outW=Math.round(outW*sc);outH=Math.round(outH*sc);}
  canvas.width=outW;canvas.height=outH;
  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(video,sx,sy,Math.round(sw),Math.round(sh),0,0,outW,outH);
  let dataUrl="";
  try{dataUrl=canvas.toDataURL("image/jpeg",0.88);}catch(e){}
  if(!dataUrl||dataUrl==="data:,"||dataUrl.length<100){
    try{dataUrl=canvas.toDataURL("image/png");}catch(e){}
  }
  if(!dataUrl||dataUrl.length<100) throw new Error("Image capture failed. Please try again.");
  return dataUrl;
}

/* ── CLARITY ── */
async function measureClarity(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=function(){
      try{
        const sc=document.createElement("canvas");
        const sw2=Math.round(img.width*0.7),sh2=Math.round(img.height*0.45);
        const sx2=Math.round((img.width-sw2)/2),sy2=Math.round(img.height*0.5);
        sc.width=sw2;sc.height=sh2;
        const ctx=sc.getContext("2d",{willReadFrequently:true});
        ctx.drawImage(img,sx2,sy2,sw2,sh2,0,0,sw2,sh2);
        const d=ctx.getImageData(0,0,sw2,sh2).data;
        const g=new Float32Array(sw2*sh2);
        for(let i=0,p=0;i<d.length;i+=4,p++) g[p]=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        let s=0,s2=0,n=0;
        for(let y=1;y<sh2-1;y++) for(let x=1;x<sw2-1;x++){
          const p=y*sw2+x;const l=-g[p-sw2]-g[p-1]+4*g[p]-g[p+1]-g[p+sw2];
          s+=l;s2+=l*l;n++;
        }
        const v=(s2-(s*s)/n)/n;
        resolve(Math.min(100,Math.max(0,Math.round((Math.sqrt(v)/45)*100))));
      }catch(e){resolve(null);}
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}

/* ── SERVER CALL ── */
async function callServer(action,payload){
  const body=Object.assign({action},payload||{});
  if(body.imageDataUrl!==undefined){
    const du=String(body.imageDataUrl||"").trim();
    if(!du||du==="data:,"||du.length<50) throw new Error("Captured image is blank — tap RESET and try again.");
    body.imageDataUrl=du;
  }
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),35000);
  let res,text;
  try{
    res=await fetch(BACKEND_URL,{method:"POST",body:JSON.stringify(body),signal:ctrl.signal});
    text=await res.text();
  }catch(err){
    clearTimeout(to);
    if(err.name==="AbortError") throw new Error("Request timed out. Check internet.");
    throw new Error("Network error: "+(err.message||String(err)));
  }finally{clearTimeout(to);}
  if(!res||!res.ok) throw new Error("HTTP "+(res&&res.status?res.status:0)+" - "+(text||"").slice(0,300));
  try{return JSON.parse(text);}
  catch(e){throw new Error("Server error: "+(text||"").slice(0,300));}
}

/* ── CAPTURE FRAME (called from fixed button) ── */
async function onCaptureFrame(){
  if(uiState!=="cam") return;
  const sess=++capSess;
  uiState="processing";showUI();

  let dataUrl;
  try{dataUrl=captureROI();}
  catch(err){
    setStatus("Capture error: "+(err&&err.message?err.message:String(err)),"err");
    uiState="cam";showUI();return;
  }

  stopCamera();

  // Show preview
  document.getElementById("prevImg").src=dataUrl;
  document.getElementById("prevWrap").style.display="block";
  document.getElementById("prevTag").textContent="📸 Captured — OCR Running...";
  document.getElementById("clarityTag").textContent="";
  measureClarity(dataUrl).then(pct=>{
    if(pct!==null) document.getElementById("clarityTag").textContent="Clarity: "+pct+"%";
  });

  tx("dCapW","...");
  setStatus("Image captured ✅\nRunning OCR — please wait...","info");

  const tOcr=performance.now();
  let r;
  try{r=await callServer("visionExtract",{imageDataUrl:dataUrl});}
  catch(err){
    if(sess!==capSess) return;
    document.getElementById("prevTag").textContent="❌ OCR Failed";
    tx("dCapW","-");
    setStatus("OCR call failed:\n"+(err&&err.message?err.message:String(err)),"err");
    uiState="idle";showUI();return;
  }

  if(sess!==capSess) return;
  const msOcr=_ms_(tOcr);

  if(!r||!r.ok){
    document.getElementById("prevTag").textContent="❌ OCR Failed";
    tx("dCapW","-");
    setStatus("OCR FAILED: "+(r&&r.message?r.message:"Unknown")+"\nRAW: "+(r&&r.rawText?r.rawText:"")+"\n["+msOcr+"ms]","err");
    callServer("postFailTasks",{imageDataUrl:dataUrl,failMessage:(r&&r.message)||"OCR failed",rawText:(r&&r.rawText)||""}).catch(()=>{});
    uiState="idle";showUI();return;
  }

  document.getElementById("prevTag").textContent="📸 Captured";

  // Fill member/item data
  tx("dMid",  r.memberId||"-");
  tx("dMname",r.memberName||"-");
  tx("dItem", r.itemName||"-");

  const isBoxes=(stage==="BOXES");
  const isExtra=(stage==="EXTRA_WEIGHT");

  if(isBoxes){
    // BOXES COUNT: do NOT show weight, show count input only
    tx("dCapW","-");
    document.getElementById("boxesInput").value="";
    document.getElementById("boxesInput").focus();
  } else {
    // All other stages: show captured weight + override input
    const wtStr=(r.weight!==null&&r.weight!==undefined)?String(r.weight):"-";
    tx("dCapW",wtStr);
    if(r.weight!==null&&r.weight!==undefined){
      document.getElementById("wtInput").value=r.weight;
      document.getElementById("wtInput").dataset.original=String(r.weight);
      document.getElementById("wtInput").dataset.edited="false";
    }
  }

  if(isExtra){
    const wtStr=(r.weight!==null&&r.weight!==undefined)?String(r.weight):"-";
    const ei=document.getElementById("extraInfo");
    ei.style.display="block";
    ei.textContent="ℹ️ EXTRA WEIGHT: "+wtStr+" kg will be ADDED to last OUT WEIGHT for this member.";
  }

  pending={memberId:r.memberId,itemName:r.itemName,weight:r.weight,dataUrl};

  uiState="await";
  if(isBoxes){
    setStatus("OCR DONE ✅\nMember: "+(r.memberId||"-")+" | Item: "+(r.itemName||"-")+"\n\nEnter Boxes Count below → press SUBMIT.\n[OCR: "+msOcr+"ms]","ok");
  } else {
    const wtStr=(r.weight!==null&&r.weight!==undefined)?String(r.weight):"-";
    setStatus("OCR DONE ✅\nMember: "+(r.memberId||"-")+" | Item: "+(r.itemName||"-")+" | Weight: "+wtStr+" kg\n\nVerify → press SUBMIT.\n[OCR: "+msOcr+"ms]","ok");
  }
  showUI();
}

/* ── SUBMIT ── */
async function onSubmit(){
  if(uiState!=="await"||!pending){
    setStatus("No captured data. Select a stage to capture.","err");return;
  }

  const isBoxes=(stage==="BOXES");
  let value;
  let weightEdited=false;

  if(isBoxes){
    // BOXES COUNT: get count from input
    const cnt=parseInt(document.getElementById("boxesInput").value,10);
    if(!cnt||cnt<1){
      setStatus("⚠️ Please enter a valid Boxes Count.","err");
      document.getElementById("boxesInput").focus();return;
    }
    value=cnt;
  } else {
    // All other stages: get weight (possibly overridden)
    const ov=document.getElementById("wtInput").value.trim();
    const n=parseFloat(ov);
    if(ov!==""&&isFinite(n)&&n>0){
      value=n;
      const ocrVal=pending.weight;
      weightEdited=(ocrVal===null||ocrVal===undefined||Math.abs(n-Number(ocrVal))>0.0005);
    } else {
      value=pending.weight;
      weightEdited=false;
    }
  }

  if(value===null||value===undefined){
    setStatus("⚠️ Weight missing. Try capturing again.","err");return;
  }

  // BOXES: validate item name contains (BOX) or (BOXES) in brackets
  if(isBoxes){
    const itn=String(pending.itemName||"");
    if(!/\(BOX(?:ES)?\)/i.test(itn)){
      setStatus("⚠️ BOXES COUNT not allowed ❌\nItem name must contain (BOX) or (BOXES) in brackets.\nFound: \""+itn+"\"","err");
      uiState="await";showUI();return;
    }
  }

  uiState="submitting";showUI();
  setStatus("Submitting to Google Sheet...","info");

  const tSub=performance.now();
  let resp;
  try{
    resp=await callServer("stageSubmit",{
      stage,
      memberId:pending.memberId,
      itemName:pending.itemName,
      value,
      weightEdited,
      imageDataUrl:pending.dataUrl
    });
  }catch(err){
    setStatus("Submit failed:\n"+(err&&err.message?err.message:String(err)),"err");
    uiState="await";showUI();return;
  }

  const msSub=_ms_(tSub);



  if(!resp||!resp.ok){
    const msg=resp&&resp.message?resp.message:"Unknown error";
    setStatus("❌ "+msg+"\n["+msSub+"ms]","err");
    if(msg.includes("rejected")||msg.includes("already")||msg.includes("first")){
      pending=null;uiState="idle";
    } else {
      uiState="await";
    }
    showUI();return;
  }

  // Success
  tickSound();
  const d=resp.data||{};
  tx("dMid",  d.memberId||pending.memberId||"-");
  tx("dMname",d.memberName||"-");
  tx("dItem", d.itemName||pending.itemName||"-");
  tx("dCapW", "-");
  tx("dOutW", (d.outWeight!==null&&d.outWeight!==undefined&&d.outWeight!=="")?d.outWeight:"-");
  tx("dInW",  (d.inWeight !==null&&d.inWeight !==undefined&&d.inWeight  !=="")?d.inWeight :"-");

  if(stage==="BOXES"&&resp.boxesCount!==undefined){
    tx("dReadyW","📦 "+resp.boxesCount+" boxes");
  } else {
    const rdW=d.readyWeight;
    tx("dReadyW",(rdW!==null&&rdW!==undefined&&rdW!=="")?String(rdW):"-");
  }

  setShortage(d.shortage!==undefined?d.shortage:null);

  let stLbl=resp.stage||stage;
  if(stage==="EXTRA_WEIGHT"&&resp.newOutWeight!==undefined)
    stLbl="EXTRA ✅  "+resp.previousOutWeight+" → "+resp.newOutWeight+" kg";
  else if(stLbl==="OUT")   stLbl="OUT ✅";
  else if(stLbl==="IN")    stLbl="IN ✅";
  else if(stLbl==="READY") stLbl="READY ✅";
  else if(stLbl==="BOXES") stLbl="BOXES COUNT ✅";
  else if(d.completed)     stLbl="COMPLETED ✅";
  tx("dStage",stLbl);


  const OVL={OUT:"OUT SAVED ✅",IN:"IN SAVED ✅",READY:"READY SAVED ✅",BOXES:"BOXES COUNT LOGGED ✅",EXTRA_WEIGHT:"EXTRA WEIGHT ADDED ✅"};
  showOverlay(OVL[stage]||"LOGGED ✅",resp.message||"");
  setStatus("SUCCESS ✅  "+(resp.message||stLbl)+" ["+msSub+"ms]","ok");

  pending=null;
  uiState="idle";
  showUI();
}

/* ── WIRE UP ── */
Object.entries(STAGE_CFG).forEach(([k,v])=>{
  document.getElementById(v.id).addEventListener("click",()=>selectStage(k));
});
btnCapFixed.addEventListener("click",onCaptureFrame);
btnSubmit.addEventListener("click",onSubmit);
btnResetA.addEventListener("click",doReset);

/* ── INIT ── */
showUI();
setStatus("Select a stage above to open camera.","info");
</script>
