<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anymech Live Capture</title>
  <style>
    body{font-family:system-ui,Arial;margin:16px;max-width:900px}

    .appFrame{
      border:1px solid #e6e6e6;
      border-radius:22px;
      padding:18px;
      box-shadow:0 14px 40px rgba(0,0,0,0.10);
      background:#fff;
    }

    .brandTitle{
      font-size:22px;
      font-weight:900;
      color:#0b5ed7;
      letter-spacing:0.6px;
      margin:0 0 10px 0;
      text-align:center;
    }

    /* ✅ FULL SCREEN CAMERA PREVIEW */
    .camWrap{
  width: 100vw;
  height: 100vh;
  margin: 0;
  position: fixed;
  inset: 0;
  padding-top: 0;
  background: #000;
  border-radius: 0;
  overflow: hidden;
  z-index: 9990;
  display: none;
      
align-items: center;
justify-content: center;
 padding-bottom: 120px;
}

    .camWrap video{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ✅ ADDED: ROI viewport (rectangle) */
    .roiViewport{
      width: min(99vw, 1080px);
      aspect-ratio: 1.65 / 1;
      margin: 14px auto;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background:#000;
      z-index: 9991;
    }
    .roiViewport video{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;

  /* override global square rule */
  aspect-ratio: auto;

  border-radius: 0;
}
    .roiBorder{
      position:absolute;
      inset:0;
      border:3px solid rgba(255,255,255,0.85);
      border-radius: 14px;
      pointer-events:none;
      z-index: 2;
    }

    .card{border:1px solid #ddd;border-radius:14px;padding:14px;margin:12px 0;background:#fff}
    .status{background:#f6f6f6;padding:12px;border-radius:10px;margin-top:10px;white-space:pre-wrap}

    .kv{display:grid;grid-template-columns:180px 1fr;gap:10px}
    .kv div{padding:8px 0;border-bottom:1px dashed #eee}
    .label{font-weight:700}
    .kv div:nth-child(2n){font-weight:800}

    video{width:100%;aspect-ratio:1/1;object-fit:cover;background:#000;border-radius:12px}
    canvas{display:none}
    .ok{color:#0a7a0a;font-weight:800}

    .guideLine{
      position:absolute;
      left:0; right:0;
      height:2px;
      background:rgba(255,0,0,0.85);
      top:50%;
      pointer-events:none;
      z-index: 3;
    }
    .guideLabel{
      position:absolute;
      left:10px;
      top:calc(50% - 22px);
      background:rgba(0,0,0,0.55);
      color:#fff;
      font-size:12px;
      padding:4px 8px;
      border-radius:8px;
      pointer-events:none;
      z-index: 3;
    }

    /* ✅ CAPTURE BUTTON ON TOP OF FULL SCREEN CAMERA */
    .btn{
      width:100%;
      padding:22px;
      border-radius:16px;
      font-size:22px;
      font-weight:900;
      border:1px solid #b9b9b9;
      cursor:pointer;
      background:linear-gradient(#ffffff,#f1f1f1);
      box-shadow:
        0 10px 0 #d0d0d0,
        0 18px 28px rgba(0,0,0,0.12);
      transition:transform 0.08s ease, box-shadow 0.08s ease;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active{
      transform:translateY(6px);
      box-shadow:
        0 4px 0 #d0d0d0,
        0 10px 18px rgba(0,0,0,0.12);
    }

    /* ✅ button fixed bottom-center while camera full screen */
    .btnFixed{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 22px;
      z-index: 9992;
      width: min(92vw, 420px);
      display: none; /* show only when camera is ON */
    }

    .hlRed{background:#ffcccc;border-radius:10px;padding:6px 10px;display:inline-block}
    .hlGreen{background:#ccffcc;border-radius:10px;padding:6px 10px;display:inline-block}

    /* ✅ ADDED: mobile view (no logic change) */
    @media (max-width: 520px){
      body{margin:10px;max-width:100%}
      .appFrame{padding:12px;border-radius:18px}
      .card{margin:10px 0;padding:12px}
      .kv{grid-template-columns:140px 1fr}
      .btn{padding:24px;font-size:22px;border-radius:18px}
      .brandTitle{font-size:22px}
    }

    /* ✅ ADDED: overlay for "LOGGED COMPLETED" */
    .overlayDone{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.18);
      z-index:9999;
    }
    .overlayCard{
      background:#fff;
      border-radius:20px;
      padding:22px 18px;
      box-shadow:0 18px 50px rgba(0,0,0,0.20);
      text-align:center;
      width:min(320px, 88vw);
    }
    .overlayTick{
      font-size:64px;
      line-height:1;
      color:#0a7a0a;
      font-weight:900;
      margin-bottom:10px;
    }
    .overlayText{
      font-size:18px;
      font-weight:900;
      color:#0a7a0a;
      letter-spacing:0.4px;
    }

    @media (max-width: 768px) {
      body{margin:8px;font-size:20px}
      .appFrame{padding:20px;border-radius:26px}
      .card{padding:18px}
      .kv{grid-template-columns:140px 1fr;gap:14px}
      .kv div{font-size:18px;padding:12px 0}
      .label{font-size:18px;font-weight:800}
      video{border-radius:16px}
      .btn{font-size:22px;padding:26px;border-radius:18px}
      .status{font-size:16px;padding:16px}

    .appTitle{
      text-align:center;
      font-size:38px;
      font-weight:900;
      color:#0b4fd6;
      letter-spacing:1.2px;

    .kv div{font-size:24px;padding:16px 0}
    .label{font-size:24px;font-weight:900}

    #memberId,#memberName,#itemName,#outW,#inW,#readyW,#stage{
      font-size:24px;

      .kv div{font-size:26px}
      .label{font-size:26px}
      #memberId,#memberName,#itemName,#outW,#inW,#readyW,#stage{font-size:26px}
    }

    #btnCapture{
      display:block;
      margin:32px auto 12px auto;
      width:min(94%, 460px);
      padding:32px;
      font-size:28px;
      font-weight:900;

    @media (max-width: 768px){

    #btnSubmit{

      width:min(94%, 460px);
      padding:32px;
      font-size:28px;
      font-weight:900;

    }
    @media (max-width: 768px){
      #btnSubmit{
        width:96%;
        padding:36px;
        font-size:30px;
        border-radius:24px;
      }
    }

    #btnReset{
      display:block;
      margin:12px auto 12px auto;
      width:min(94%, 460px);
      padding:32px;
      font-size:28px;
      font-weight:900;
      border-radius:22px;
    }
    @media (max-width: 768px){
      #btnReset{
        width:96%;
        padding:36px;
        font-size:30px;
        border-radius:24px;
      }
    }

<body>
  <div class="appFrame">
    <h1 class="appTitle">ANYMECH PRODUCTS</h1>

      <canvas id="canvas"></canvas>

      <!-- ✅ Captured image shown while OCR runs -->

    <div class="card">

      </div>
    </div>

    <button class="btn" id="btnCapture">CAPTURE</button>
    <button class="btn" id="btnSubmit" style="display:none;">SUBMIT</button>
    <button class="btn" id="btnReset" style="display:none;">RESET</button>

    <script>
      window.onerror = function (msg, src, line, col, err) {
        const s = "JS ERROR: " + msg + "\n" + (src||"") + ":" + line + ":" + col;
        try { document.getElementById("status").textContent = s; } catch(e) {}
        return false;
      };
    </script>

    <script>
      function _ms_(t0){ return Math.round((performance.now() - t0)); }

      let uiState = "idle";
      let stream = null;
      let pendingCapture = null;

      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const camWrap = document.getElementById("camWrap");
      const btnFixedWrap = document.getElementById("btnFixedWrap");
      const btnCaptureFixed = document.getElementById("btnCaptureFixed");

      const btnSubmit = document.getElementById("btnSubmit");
      const btnReset  = document.getElementById("btnReset");

      function setStatus(t){ document.getElementById("status").textContent = t; }
      function setBtn(t){ document.getElementById("btnCapture").textContent = t; btnCaptureFixed.textContent = t; }
      function setText(id, t){ document.getElementById(id).textContent = (t ?? "-"); }

      function setStageText(t, completed){
        const el = document.getElementById("stage");
        el.textContent = t ?? "-";
        el.className = completed ? "ok" : "";
      }

      function setShortMaterial(v){
        const el = document.getElementById("shortMat");
        el.className = "";
        if (v === null || v === undefined || v === "" || Number.isNaN(v)){
          el.textContent = "-";
          return;
        }
        const n = Number(v);
        el.textContent = n.toFixed(3);
        if (n < -0.200) el.className = "hlRed";
        else if (n > 0.200) el.className = "hlGreen";
      }

      function tickSound(){
        try{
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = "square";
          o.frequency.value = 1200;
          g.gain.value = 0.06;
          o.connect(g); g.connect(ctx.destination);
          o.start();
          setTimeout(()=>{ o.stop(); ctx.close(); }, 90);
        }catch(e){}
      }

      function showLoggedOverlay(){
        const el = document.getElementById("overlayDone");
        if (!el) return;
        el.style.display = "flex";
        setTimeout(()=>{ el.style.display = "none"; }, 1000);
      }

      function resetDisplay(){
        setText("memberId","-");
        setText("memberName","-");
        setText("itemName","-");
        setText("outW","-");
        setText("inW","-");
        setText("readyW","-");
        setShortMaterial(null);
        setStageText("-", false);
        setText("capW","-");
      }

      // ===============================
      // ✅ GitHub Pages → Apps Script WebApp (doPost) using fetch()
      // IMPORTANT: do NOT send Content-Type header to avoid CORS preflight
      // ===============================
      const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyVRq8tSGdQnevmyumlCwQvFvE6scq1ovl4cefXluL-p4bnBG__1TjaMh55SaMFOWGupQ/exec";

      async function callServer(action, payload){
        const body = Object.assign({ action }, payload || {});
        const ctrl = new AbortController();
        const to = setTimeout(() => ctrl.abort(), 25000);

        let res, text;
        try{
          res = await fetch(APPS_SCRIPT_WEBAPP_URL, {
            method: "POST",
            body: JSON.stringify(body),
            signal: ctrl.signal
          });
          text = await res.text();
        } finally {
          clearTimeout(to);
        }

        if (!res || !res.ok){
          throw new Error("HTTP " + (res ? res.status : "0") + " " + (res ? res.statusText : "") + "\n\n" + (text ? text.slice(0, 600) : ""));
        }

        try{
          return JSON.parse(text);
        }catch(e){
          throw new Error("JSON parse failed. Server returned:\n\n" + (text ? text.slice(0, 600) : ""));
        }
      }

      function showCaptureButtons(){
        document.getElementById("btnCapture").style.display = (camWrap.style.display === "flex") ? "none" : "block";
        btnFixedWrap.style.display = (camWrap.style.display === "flex") ? "block" : "none";
        btnSubmit.style.display = "none";
        btnReset.style.display = "none";
      }

      function showSubmitButtonOnly(){
        btnFixedWrap.style.display = "none";
        document.getElementById("btnCapture").style.display = "none";
        btnSubmit.style.display = "block";
        btnReset.style.display = "block";
      }

      function showCameraUI(on){
        camWrap.style.display = on ? "flex" : "none";
        btnFixedWrap.style.display = on ? "block" : "none";
        document.getElementById("btnCapture").style.display = on ? "none" : "block";

        if (uiState === "await_submit") {
          btnFixedWrap.style.display = "none";
          document.getElementById("btnCapture").style.display = "none";
          btnSubmit.style.display = "block";
          btnReset.style.display = "block";
        } else {
          btnSubmit.style.display = "none";
          btnReset.style.display = "none";
        }
      }

      window.startLiveCamera = async function startLiveCamera(){
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
          throw new Error("Camera API not available in this browser/webview.");
        }
        if (!window.isSecureContext){
          throw new Error("Camera blocked: page is not HTTPS (secure). Open using https:// (or localhost).");
        }

        try { video.muted = true; } catch(e) {}

        try{
          if (navigator.permissions && navigator.permissions.query){
            const st = await navigator.permissions.query({ name: "camera" });
            if (st && st.state === "denied"){
              throw new Error("Camera permission is DENIED in browser settings. Allow camera for this site and reload.");
            }
          }
        }catch(e){}

        const preferred = {
          video: {
            facingMode: { ideal: "environment" },
            width: { min: 1280, ideal: 1920, max: 1920 },
            height: { min: 720, ideal: 1080, max: 1080 },
            aspectRatio: { ideal: 16/9 }
          },
          audio: false
        };

        try{
          stream = await navigator.mediaDevices.getUserMedia(preferred);
        }catch(e1){
          try{
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: "environment" }, aspectRatio: { ideal: 16/9 } },
              audio: false
            });
          }catch(e2){
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          }
        }

        video.srcObject = stream;
// ✅ Camera tuning: apply ONLY supported constraints (focus/zoom/torch/exposure)
// (does not change UI/workflow; only tries to improve live stream sharpness)
try{
  const track = stream.getVideoTracks()[0];
  const caps = track && track.getCapabilities ? track.getCapabilities() : null;

  console.log("[CAM] capabilities =", caps);

  const adv = [];

  // Focus mode (if supported)
  if (caps && caps.focusMode && Array.isArray(caps.focusMode)){
    if (caps.focusMode.includes("continuous")) adv.push({ focusMode: "continuous" });
    else if (caps.focusMode.includes("auto")) adv.push({ focusMode: "auto" });
  }

  // Focus distance (closest focus for near objects like scale/card)
  // NOTE: only works on devices that expose focusDistance
  if (caps && caps.focusDistance && typeof caps.focusDistance.min === "number"){
    adv.push({ focusDistance: caps.focusDistance.min });
  }

  // Slight zoom can improve readability of small digits (if supported)
  if (caps && caps.zoom && typeof caps.zoom.min === "number" && typeof caps.zoom.max === "number"){
    const targetZoom = Math.min(caps.zoom.max, Math.max(caps.zoom.min, 1.3));
    adv.push({ zoom: targetZoom });
  }

  // Torch: kept auto — do not force on
  // if (caps && caps.torch){ adv.push({ torch: true }); }

  // Exposure mode (if supported)
  if (caps && caps.exposureMode && Array.isArray(caps.exposureMode)){
    if (caps.exposureMode.includes("continuous")) adv.push({ exposureMode: "continuous" });
  }

  // ✅ Shutter speed 50–100 Hz range for anti-flicker + sunlight LED readability
  // 50 Hz = 1/50s (20000µs), 100 Hz = 1/100s (10000µs)
  // This prevents LED display flicker sync issues and keeps digits sharp in sunlight.
  // exposureTime is in microseconds on most devices.
  if (caps && caps.exposureTime &&
      typeof caps.exposureTime.min === "number" &&
      typeof caps.exposureTime.max === "number"){
    const us50hz  = 20000; // 1/50s in microseconds
    const us100hz = 10000; // 1/100s in microseconds
    // Clamp to what the device actually supports
    const targetExp = Math.min(
      caps.exposureTime.max,
      Math.max(caps.exposureTime.min, us100hz)
    );
    // Only apply if it falls within our 50–100 Hz window
    if (targetExp >= us100hz && targetExp <= us50hz){
      adv.push({ exposureTime: targetExp });
      console.log("[CAM] exposureTime set =", targetExp, "µs (", (1000000/targetExp).toFixed(1), "Hz )");
    } else if (caps.exposureTime.max >= us100hz && caps.exposureTime.min <= us50hz){
      // Device range overlaps our window — pick closest value inside it
      const clamped = Math.min(us50hz, Math.max(us100hz, caps.exposureTime.min));
      adv.push({ exposureTime: clamped });
      console.log("[CAM] exposureTime clamped =", clamped, "µs (", (1000000/clamped).toFixed(1), "Hz )");
    } else {
      console.log("[CAM] exposureTime range", caps.exposureTime.min, "-", caps.exposureTime.max, "µs does not cover 50–100 Hz window, skipping.");
    }
  }

  if (adv.length){
    await track.applyConstraints({ advanced: adv });
    console.log("[CAM] appliedConstraints.advanced =", adv);
  } else {
    console.log("[CAM] No advanced constraints supported on this device/browser.");
  }

}catch(e){
  console.log("[CAM] applyConstraints error:", e);
}
        await new Promise(r => {
          if (video.videoWidth && video.videoHeight) return r();
          video.onloadedmetadata = () => r();
        });

        await video.play();
        await new Promise(r => requestAnimationFrame(r));
        await new Promise(r => requestAnimationFrame(r));

        showCameraUI(true);
      }
        /* =========================
   PATCH 1: Add stream-resolution logs (minimal)
   Put this INSIDE startLiveCamera(), AFTER video metadata is ready
   (right after the onloadedmetadata wait is fine)
   ========================= */
try{
  const tracks = stream ? stream.getVideoTracks() : [];
  const t0 = tracks && tracks[0] ? tracks[0] : null;

  console.log("[CAM] video.videoWidth/video.videoHeight =", video.videoWidth, video.videoHeight);

  if (t0 && t0.getSettings){
    console.log("[CAM] track.getSettings() =", t0.getSettings());
  } else {
    console.log("[CAM] track.getSettings() = Not available");
  }
}catch(e){
  console.log("[CAM] log error:", e);
      }

      window.stopLiveCamera = function stopLiveCamera(){
        try{
          if (stream){
            stream.getTracks().forEach(t => t.stop());
            stream = null;
          }
        }catch(e){}
        video.srcObject = null;
        showCameraUI(false);
      }

      /* ✅ UPDATED: capture EXACTLY what roiViewport shows (portrait, ROI-only) */
     /* =========================
   PATCH 2: Replace your captureDataUrlFull() with this
   - Matches ROI preview 1:1 using object-fit: cover math
   - No rotation, uses video frame only
   - Adds console logs requested
   - Clarity: increases output pixels (configurable)
   ========================= */
function captureDataUrlFull(opts){
  opts = opts || {};

  const roi = document.getElementById("roiViewport");
  if (!roi) throw new Error("roiViewport not found");

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) throw new Error("Video metadata not ready");

  // Optional config (does not change workflow unless you set it)
  const jpegQuality = (typeof opts.jpegQuality === "number") ? opts.jpegQuality : 0.86; // 0.90–0.95 requested
  const maxOutW = (typeof opts.maxOutW === "number") ? opts.maxOutW : 1600; // 0 = do not cap by default

  // DOM rects
  const vRect = video.getBoundingClientRect();
  const rRect = roi.getBoundingClientRect();

  console.log("[CAP] video DOM rect =", {
    left: vRect.left, top: vRect.top, width: vRect.width, height: vRect.height
  });
  console.log("[CAP] ROI DOM rect =", {
    left: rRect.left, top: rRect.top, width: rRect.width, height: rRect.height
  });

  // Ensure no transform/rotation is affecting capture (log only)
  try{
    const tr = getComputedStyle(video).transform;
    console.log("[CAP] video computed transform =", tr);
  }catch(e){
    console.log("[CAP] computedStyle(transform) = Not available");
  }

  // ROI position relative to the VIDEO element in DOM pixels
  const roiX = (rRect.left - vRect.left);
  const roiY = (rRect.top  - vRect.top );
  const roiW = rRect.width;
  const roiH = rRect.height;

  // ---- object-fit: cover math ----
  // Scale factor used to cover the element
  const scale = Math.max(vRect.width / vw, vRect.height / vh);

  // Size of the scaled camera frame as it would be drawn into the element
  const drawnW = vw * scale;
  const drawnH = vh * scale;

  // Center-crop offsets (in DOM pixels) due to cover
  const offX = (drawnW - vRect.width) / 2;
  const offY = (drawnH - vRect.height) / 2;

  console.log("[CAP] cover math =", { scale, drawnW, drawnH, offX, offY });

  // Map ROI DOM pixels -> source video pixels
  let sx = (roiX + offX) / scale;
  let sy = (roiY + offY) / scale;
  let sw = (roiW) / scale;
  let sh = (roiH) / scale;

  // Clamp to source bounds
  if (sx < 0) { sw += sx; sx = 0; }
  if (sy < 0) { sh += sy; sy = 0; }
  if (sx + sw > vw) sw = vw - sx;
  if (sy + sh > vh) sh = vh - sy;

  console.log("[CAP] source crop sx/sy/sw/sh =", { sx, sy, sw, sh });

  // Output size (avoid unnecessary downscaling)
  // Default: keep full crop resolution (no cap) unless maxOutW provided
  let outW = Math.round(sw);
  let outH = Math.round(sh);

  if (maxOutW > 0 && outW > maxOutW){
    const outScale = maxOutW / outW;
    outW = Math.round(outW * outScale);
    outH = Math.round(outH * outScale);
  }

  canvas.width = outW;
  canvas.height = outH;

  console.log("[CAP] canvas output size =", { outW, outH });

  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.imageSmoothingEnabled = false;

  // Draw video frame only (overlays do not affect canvas drawImage)
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outW, outH);

  return canvas.toDataURL("image/jpeg", jpegQuality);
}
      /* ✅ Image clarity measurement — returns 0–100%
         Measures sharpness using Laplacian variance on the digit area
         (bottom-centre of frame where the scale display is).
         High variance = sharp edges = good clarity.
      */
      function measureClarity(dataUrl){
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = function(){
            try{
              const sc = document.createElement("canvas");
              const sw = Math.round(img.width  * 0.70);
              const sh = Math.round(img.height * 0.45);
              const sx = Math.round((img.width - sw) / 2);
              const sy = Math.round(img.height * 0.50);
              sc.width = sw; sc.height = sh;
              const ctx = sc.getContext("2d", { willReadFrequently: true });
              ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
              const d = ctx.getImageData(0, 0, sw, sh).data;

              // Convert to greyscale
              const grey = new Float32Array(sw * sh);
              for (let i = 0, p = 0; i < d.length; i += 4, p++){
                grey[p] = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
              }

              // Laplacian variance (sharpness metric)
              let sum = 0, sum2 = 0, count = 0;
              for (let y = 1; y < sh - 1; y++){
                for (let x = 1; x < sw - 1; x++){
                  const p = y * sw + x;
                  const lap = -grey[p-sw] - grey[p-1] + 4*grey[p] - grey[p+1] - grey[p+sw];
                  sum  += lap;
                  sum2 += lap * lap;
                  count++;
                }
              }
              const variance = (sum2 - (sum * sum) / count) / count;

              // Map variance to 0–100%:
              // <50  = very blurry, >2000 = very sharp (empirical thresholds for scale digits)
              const pct = Math.min(100, Math.max(0, Math.round((Math.sqrt(variance) / 45) * 100)));
              resolve(pct);
            }catch(e){
              resolve(null);
            }
          };
          img.onerror = () => resolve(null);
          img.src = dataUrl;
        });
      }

      window.resetClick = async function resetClick(){
        pendingCapture = null;
        btnSubmit.textContent = "SUBMIT";
        resetDisplay();

        // ✅ Hide captured preview on reset
        const pw = document.getElementById("capturedPreviewWrap");
        if (pw){ pw.style.display = "none"; document.getElementById("capturedPreviewImg").src = ""; }
        const cl = document.getElementById("capturedClarityLabel");
        if (cl) cl.textContent = "";

        setBtn("CAPTURE FRAME");
        setStatus("RESET ✅\nStarting camera again...");
        try{
          await startLiveCamera();
          uiState = "camera_on";
          setStatus("Camera ON ✅\nPress CAPTURE FRAME to capture image first, then OCR (Submit will be shown after OCR).");
          showCaptureButtons();
        }catch(err){
          uiState = "idle";
          setBtn("CAPTURE");
          setStatus("RESET ✅\nCamera failed: " + (err && err.name ? (err.name + " - " + (err.message || "")) : String(err)));
          showCaptureButtons();
        }
      }

      window.submitClick = async function submitClick(){
        if (uiState !== "await_submit" || !pendingCapture){
          setStatus("No captured data pending. Please CAPTURE first.");
          uiState = "idle";
          pendingCapture = null;
          setBtn("CAPTURE");
          showCaptureButtons();
          return;
        }

        const tSub0 = performance.now();
        setStatus("Submitting...");
        btnSubmit.textContent = "SUBMITTING...";

        let resp;
        try{
          resp = await callServer("captureFromOcr", {
            memberId: pendingCapture.memberId,
            itemName: pendingCapture.itemName,
            weight: pendingCapture.weight,
            imageDataUrl: pendingCapture.dataUrl
          });
        }catch(err){
          const msSub = _ms_(tSub0);
          setStatus(
            "ERROR: Submit call failed\n" +
            (err && err.message ? err.message : String(err)) +
            "\n\nTIMING:\nSubmit call: " + msSub + " ms"
          );
          btnSubmit.textContent = "SUBMIT";
          return;
        }

        const msSub = _ms_(tSub0);

        if (!resp || !resp.ok){
          setStatus("ERROR: " + (resp && resp.message ? resp.message : "Unknown submit error"));
          btnSubmit.textContent = "SUBMIT";
          return;
        }

        const d = (resp && resp.data) ? resp.data : {};

        const outW = (d.outWeight !== undefined && d.outWeight !== null && String(d.outWeight).trim() !== "") ? Number(d.outWeight) : null;
        const inW  = (d.inWeight  !== undefined && d.inWeight  !== null && String(d.inWeight).trim()  !== "") ? Number(d.inWeight)  : null;
        const rdW  = (d.readyWeight !== undefined && d.readyWeight !== null && String(d.readyWeight).trim() !== "") ? Number(d.readyWeight) : null;

        setText("outW",   (outW !== null && !Number.isNaN(outW)) ? String(outW) : "-");
        setText("inW",    (inW  !== null && !Number.isNaN(inW))  ? String(inW)  : "-");
        setText("readyW", (rdW  !== null && !Number.isNaN(rdW))  ? String(rdW)  : "-");

        if (resp.stage === "OUT" || resp.stage === "IN" || resp.stage === "READY") tickSound();

        if (outW !== null && inW !== null && !Number.isNaN(outW) && !Number.isNaN(inW)) setShortMaterial(inW - outW);
        else setShortMaterial(null);

        setText("memberId",   d.memberId || pendingCapture.memberId || "-");
        setText("memberName", d.memberName || pendingCapture.ocrMemberName || "-");
        setText("itemName",   d.itemName || pendingCapture.itemName || "-");
        setText("capW","-");

        let st = d.statusText || resp.stage || "-";
        const completed = !!d.completed;

        if (resp.stage === "OUT") { st = "OUT ✅"; showLoggedOverlay(); }
        else if (resp.stage === "READY" || completed === true) { st = "COMPLETED ✅"; showLoggedOverlay(); }
        else if (resp.stage === "IN") { st = "IN ✅"; }

        setStageText(st, completed || resp.stage === "READY");
        pendingCapture = null;

        setStatus(
          "SUCCESS ✅ " + resp.message + " (" + st + ")" +
          "\n\nTIMING:\nSubmit call: " + msSub + " ms"
        );

        if (resp.stage === "IN") {
          uiState = "idle";
          btnSubmit.textContent = "SUBMIT";
          setBtn("CAPTURE READY");
          setStatus("IN saved ✅\nNow capture READY WEIGHT (click CAPTURE READY).");
          try{
            await startLiveCamera();
            uiState = "camera_on";
            showCaptureButtons();
          }catch(err){
            uiState = "idle";
            setBtn("CAPTURE");
            showCaptureButtons();
            setStatus("IN saved ✅\nCamera failed for READY: " + (err && err.message ? err.message : String(err)));
          }
          return;
        }

        uiState = "idle";
        btnSubmit.textContent = "SUBMIT";
        setBtn("CAPTURE");
        showCaptureButtons();
      }

      window.captureClick = async function captureClick(){
        if (uiState === "idle"){
          pendingCapture = null;
          btnSubmit.textContent = "SUBMIT";
          btnSubmit.style.display = "none";
          btnReset.style.display = "none";

          resetDisplay();
          setBtn("CAPTURE FRAME");
          setStatus("Starting live camera...");
          try{
            await startLiveCamera();
            uiState = "camera_on";
            setStatus("Camera ON ✅\nPress CAPTURE FRAME to capture image first, then OCR (Submit will be shown after OCR).");
            showCaptureButtons();
          }catch(err){
            uiState = "idle";
            setBtn("CAPTURE");
            setStatus("Camera failed: " + (err && err.name ? (err.name + " - " + (err.message || "")) : String(err)));
            showCaptureButtons();
          }
          return;
        }

        if (uiState === "camera_on"){
          setBtn("PROCESSING...");
          setStatus("Capturing image (freezing frame)...");
          const dataUrl = captureDataUrlFull();
          stopLiveCamera();

          // ✅ Show captured image while OCR runs
          const prevWrap = document.getElementById("capturedPreviewWrap");
          const prevImg  = document.getElementById("capturedPreviewImg");
          const prevLbl  = document.getElementById("capturedPreviewLabel");
          const clarityLbl = document.getElementById("capturedClarityLabel");
          prevImg.src = dataUrl;
          prevWrap.style.display = "block";
          prevLbl.textContent = "📸 Captured — OCR Running...";
          clarityLbl.textContent = "";

          // Measure and show clarity % in red
          measureClarity(dataUrl).then(pct => {
            if (pct !== null) clarityLbl.textContent = "Clarity: " + pct + "%";
          });

          const tAll0 = performance.now();

          setStatus("Image captured ✅\nRunning OCR...");
          const tOcr0 = performance.now();
          let r;

          try{
            r = await callServer("visionExtract", { imageDataUrl: dataUrl });
          }catch(err){
            const msOcr = _ms_(tOcr0);
            prevLbl.textContent = "❌ OCR Failed";
            setStatus(
              "ERROR: OCR call failed\n" +
              (err && err.message ? err.message : String(err)) +
              "\n\nTIMING:\nOCR call: " + msOcr + " ms"
            );
            setBtn("CAPTURE");
            uiState = "idle";
            showCaptureButtons();
            return;
          }

          const msOcr = _ms_(tOcr0);

          if (!r || !r.ok){
            const msAll = _ms_(tAll0);

            // log failed OCR in backend (your doPost supports postFailTasks)
            try{
              await callServer("postFailTasks", {
                imageDataUrl: dataUrl,
                failMessage: (r && r.message) ? r.message : "OCR failed",
                rawText: (r && r.rawText) ? r.rawText : ""
              });
            }catch(e){}

            prevLbl.textContent = "❌ OCR Failed";
            setStatus(
              "ERROR: OCR failed.\n" +
              (r && r.message ? r.message : "Unknown OCR error") +
              "\n\nERROR DETAIL:\n" + (r && r.error ? r.error : "") +
              "\n\nRAW:\n" + (r && r.rawText ? r.rawText : "") +
              "\n\nTIMING:\nOCR call: " + msOcr + " ms\nTOTAL: " + msAll + " ms"
            );

            setBtn("CAPTURE");
            uiState = "idle";
            showCaptureButtons();
            return;
          }

          setText("memberId", r.memberId || "-");
          setText("memberName", r.memberName || "-");
          setText("itemName", r.itemName || "-");
          setText("capW", (r.weight !== undefined && r.weight !== null) ? String(r.weight) : "-");

          prevLbl.textContent = "";

          pendingCapture = {
            memberId: r.memberId,
            itemName: r.itemName,
            weight: r.weight,
            dataUrl: dataUrl,
            ocrMemberName: r.memberName || "",
            ocrItemName: r.itemName || ""
          };

          uiState = "await_submit";
          setBtn("CAPTURE");
          setStatus(
            "OCR DONE ✅\n" +
            "Press SUBMIT to upload & sync to Google Sheet.\n\n" +
            "TIMING:\nOCR call: " + msOcr + " ms"
          );

          showSubmitButtonOnly();
          return;
        }
      }

      resetDisplay();
      setBtn("CAPTURE");
      setStatus("Press CAPTURE to start live camera.");

      document.getElementById("btnCapture").addEventListener("click", captureClick);
      btnCaptureFixed.addEventListener("click", captureClick);
      btnSubmit.addEventListener("click", submitClick);
      btnReset.addEventListener("click", resetClick);

      showCaptureButtons();
    </script>
  </div>

  <div class="overlayDone" id="overlayDone">
    <div class="overlayCard">
      <div class="overlayTick">✅</div>
      <div class="overlayText">LOGGED COMPLETED</div>
    </div>
  </div>
</body>
